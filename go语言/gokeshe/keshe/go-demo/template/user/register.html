<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>注册页</title>
  <link rel="stylesheet" href="../../static/css/bootstrap.min.css">
  <script src="../../static/js/jquery.min.js"></script>
  <script src="../../static/js/bootstrap.min.js"></script>
</head>
<style>
  .login-block {
    position: absolute;
    top: 50%;
    transform:  translateY(-50%);
  }
</style>
<body style="background:url(../../static/img/background1.jpg) no-repeat center; background-position: center 0; background-size: cover; margin: 0px;">
<div>

  <form action="/user/register" method="post" >
    <div class="col-md-4 col-lg-4 col-lg-offset-4 col-md-offset-4 login-block" style="background-color: white; opacity: 0.8; padding: 50px; border-radius: 15px">
      <h3 style="text-align: center;padding-bottom:20px;font-family:Helvetica Neue, Helvetica, Arial, sans-serif;font-size: 40px">用户注册</h3>
      <div class="form-group input-group input-group-lg" >
        <span class="input-group-addon" id="username" >用户名&nbsp;&nbsp;&nbsp;&nbsp;</span>
        <input type="text" name="Username" class="form-control" placeholder="用户名">
      </div>
      <div class="form-group input-group input-group-lg" >
        <span class="input-group-addon" id="mobile" >手机号码</span>
        <input type="text" name="Mobile" class="form-control" placeholder="手机号码">
      </div>
      <div class="form-group input-group input-group-lg">
        <span class="input-group-addon" id="password" >密码&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        <input type="password" name="Password" class="form-control" placeholder="密码">
      </div>
      <div class="form-group center-block">
        <button type="button" id="registerButton" class="btn btn-success center-block" style="width: 80px;height: 40px;font-size: 20px">注 册</button>
        <a href="/user/login">已有账户？点击登录</a>
      </div>

    </div>
  </form>
</div>
</body>
<script>
  $(document).ready(function() {
    $('#registerButton').click(function() {
      var username = $('input[name="Username"]').val();
      var mobile = $('input[name="Mobile"]').val();
      var password = $('input[name="Password"]').val();

      $.ajax({
        url: '/user/register',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ Username: username, Mobile: mobile, Password: password }),
        success: function(response) {
          if (response.code === 200) {
            // 注册成功，跳转到登录页面
            alert(response.msg);
            window.location.href = "/user/login";
          } else {
            // 注册失败，显示错误信息
            alert(response.msg);
          }
        },
        error: function(xhr, status, error) {
          if (xhr.status === 422) {
            alert("注册失败: " + xhr.responseJSON.msg);
            var UsernameInput = document.querySelector('input[name="Username"]');
            var MobileInput = document.querySelector('input[name="Mobile"]');
            var PasswordInput = document.querySelector('input[name="Password"]');
            UsernameInput.value = '';
            MobileInput.value = '';
            PasswordInput.value = '';
          } else {
            alert("注册请求失败: " + error);
          }
        }
      });
    });
  });
</script>
</html>
