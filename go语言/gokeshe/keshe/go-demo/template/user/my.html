<head>

            font-family: Arial, sans-serif;

        }
        nav {
            background-color: #fff;

        }

        header {
            background-color: #4682B4;

        }
    </style>

<body>
<header>

    <h1>用户中心</h1>

    <ul>
         <li>ID: {{ .id }}</li>
             <li>Username: {{ .username }}</li>
         <li>Mobile: {{ .Mobile }}</li>
    </ul>

    <a href="#" onclick="GobackIndex()">返回首页</a>
        <script>
            function GobackIndex() {
                // 获取当前页面的 URL
                var currentUrl = window.location.href;
                // 在末尾增加 "/index"
                var targetUrl = currentUrl + '/index';
                // 跳转到新的 URL
                window.location.href = targetUrl;
            }
        </script>
    </li>
</header>
</body>
